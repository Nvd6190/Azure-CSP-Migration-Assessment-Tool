version: '3.8'

services:
  backend:
    build: ./backend
    container_name: csp-migration-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: csp-migration-ui
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  uploads:
